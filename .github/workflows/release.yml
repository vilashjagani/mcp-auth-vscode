name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build-and-publish:
    name: Build, package and publish
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to upload the .vsix as a GitHub Release asset

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npm run compile

      - name: Package extension (.vsix)
        run: npx vsce package --no-dependencies
        # --no-dependencies because we bundle everything with esbuild

      - name: Upload .vsix as GitHub Release asset
        uses: softprops/action-gh-release@v2
        with:
          files: "*.vsix"
          generate_release_notes: true

      - name: Publish to VS Code Marketplace
        run: npx vsce publish --no-dependencies -p ${{ secrets.VSCE_PAT }}
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}

      - name: Publish to Open VSX Registry
        run: |
          npm install -g ovsx
          ovsx publish *.vsix -p ${{ secrets.OVSX_TOKEN }}
